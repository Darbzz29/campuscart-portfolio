<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Grocery Cart</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f0f9ff; margin:0; padding:20px; }
    h1 { text-align:center; }
    .section { margin:20px auto; max-width:900px; background:#fff; padding:20px; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,0.1); }
    table { width:100%; border-collapse:collapse; margin-top:10px; }
    th, td { border:1px solid #ddd; padding:8px; text-align:center; }
    th { background:#e0f2fe; }
    img { width:60px; height:60px; object-fit:cover; border-radius:6px; }
    button { padding:6px 12px; background:#2563eb; color:#fff; border:none; border-radius:4px; cursor:pointer; }
    button:hover { background:#1e40af; }
    .remove-btn { background:#dc2626; }
    .remove-btn:hover { background:#b91c1c; }
    .summary { margin-top:15px; font-weight:bold; color:#111; }
    label { display:block; margin-top:10px; }
    input, textarea, select { width:100%; padding:8px; margin-top:4px; border:1px solid #ccc; border-radius:4px; }
    #confirmation { margin-top:10px; font-weight:bold; color:#16a34a; }
  </style>
</head>
<body>
  <h1>Student Grocery & Snacks Cart</h1>

  <!-- Items -->
  <div class="section">
    <h2>Available Items</h2>
    <table>
      <thead>
        <tr><th>Image</th><th>Item</th><th>Category</th><th>Price (₹)</th><th>Add</th></tr>
      </thead>
      <tbody>
        <tr>
          <td><img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Milk_glass.jpg" alt="Milk"></td>
          <td>Milk (1L)</td><td>Essentials</td><td>60</td>
          <td><button onclick="addToCart('Milk (1L)',1,60)">Add</button></td>
        </tr>
        <tr>
          <td><img src="https://upload.wikimedia.org/wikipedia/commons/0/0c/Bread.jpg" alt="Bread"></td>
          <td>Bread</td><td>Essentials</td><td>40</td>
          <td><button onclick="addToCart('Bread',1,40)">Add</button></td>
        </tr>
        <tr>
          <td><img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Chicken_eggs.jpg" alt="Eggs"></td>
          <td>Eggs (6)</td><td>Essentials</td><td>45</td>
          <td><button onclick="addToCart('Eggs (6)',1,45)">Add</button></td>
        </tr>
        <tr>
          <td><img src="https://upload.wikimedia.org/wikipedia/commons/6/6d/Potato_chips.jpg" alt="Chips"></td>
          <td>Chips Packet</td><td>Snacks</td><td>20</td>
          <td><button onclick="addToCart('Chips Packet',1,20)">Add</button></td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Cart -->
  <div class="section">
    <h2>Your Cart</h2>
    <table id="cartTable">
      <thead>
        <tr><th>Item</th><th>Qty</th><th>Price</th><th>Total</th><th>Remove</th></tr>
      </thead>
      <tbody></tbody>
    </table>
    <div class="summary" id="cartSummary">Cart is empty</div>
    <button onclick="showCheckout()">Proceed to Buy</button>
  </div>

  <!-- Checkout -->
  <div class="section" id="checkoutSection" style="display:none;">
    <h2>Checkout</h2>
    <form id="checkoutForm">
      <label>Full Name</label>
      <input type="text" id="name" required>
      <label>Phone Number</label>
      <input type="tel" id="phone" required>
      <label>Delivery Address</label>
      <textarea id="address" rows="3" required></textarea>
      <label>Remote Area Delivery?</label>
      <select id="remote">
        <option>No</option><option>Yes</option>
      </select>
      <button type="submit">Place Order</button>
    </form>
    <p id="confirmation"></p>
  </div>

  <script>
    let cart = [];

    function addToCart(name, qty, price) {
      const existing = cart.find(i => i.name === name);
      if (existing) {
        existing.qty += qty;
      } else {
        cart.push({ name, qty, price });
      }
      renderCart();
    }

    function removeItem(index) {
      cart.splice(index, 1);
      renderCart();
    }

    function renderCart() {
      const tbody = document.querySelector("#cartTable tbody");
      tbody.innerHTML = "";
      let totalItems = 0, totalCost = 0;

      cart.forEach((item, i) => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${item.name}</td>
          <td>${item.qty}</td>
          <td>₹${item.price}</td>
          <td>₹${item.qty * item.price}</td>
          <td><button class="remove-btn" onclick="removeItem(${i})">Remove</button></td>
        `;
        tbody.appendChild(row);
        totalItems += item.qty;
        totalCost += item.qty * item.price;
      });

      document.getElementById("cartSummary").textContent =
        cart.length ? `Total items: ${totalItems} | Total cost: ₹${totalCost}` : "Cart is empty";
    }

    function showCheckout() {
      if (cart.length === 0) {
        alert("Your cart is empty!");
        return;
      }
      document.getElementById("checkoutSection").style.display = "block";
      window.scrollTo(0, document.body.scrollHeight);
    }

    document.getElementById("checkoutForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const name = document.getElementById("name").value;
      const phone = document.getElementById("phone").value;
      const address = document.getElementById("address").value;
      const remote = document.getElementById("remote").value;
      let totalCost = cart.reduce((sum, i) => sum + i.qty * i.price, 0);
      document.getElementById("confirmation").textContent =
        `Order placed! Thank you, ${name}. Phone: ${phone}. Address: ${address}. Remote: ${remote}. Total cost: ₹${totalCost}`;
    });
  </script>
</body>
</html>
